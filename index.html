<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Pro Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2e7d32; --secondary: #1b5e20; }
        body { background-color: #f4f7f6; font-family: 'Kanit', sans-serif; }
        .hero { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 30px 15px; border-radius: 0 0 30px 30px; margin-bottom: 25px; text-align: center; }
        
        /* สไตล์ปุ่มเมนูหลัก */
        .menu-btn { background: white; border-radius: 20px; padding: 20px; text-align: center; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; width: 100%; margin-bottom: 15px; }
        .menu-btn:active { transform: scale(0.95); }
        .icon-circle { width: 60px; height: 60px; border-radius: 50%; line-height: 60px; margin: 0 auto 10px; font-size: 24px; color: white; }
        
        /* สไตล์ฟอร์มบันทึกข้อมูล */
        .form-container { display: none; background: white; border-radius: 25px; padding: 20px; margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .section-title { font-size: 1rem; font-weight: bold; color: var(--primary); border-left: 4px solid var(--primary); padding-left: 10px; margin: 20px 0 15px; }
        .form-control { border-radius: 10px; border: 1px solid #ddd; padding: 10px; }
        .btn-save { background: var(--primary); color: white; border-radius: 12px; padding: 12px; width: 100%; border: none; font-weight: bold; margin-top: 20px; }
        
        /* ส่วนประวัติ */
        #historySection { display: none; }
        .bird-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 5px solid #ff9800; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="hero">
    <h3><i class="fas fa-kiwi-bird me-2"></i>ระบบบันทึกประวัตินก</h3>
</div>

<div class="container">
    <div id="mainMenu">
        <div class="row">
            <div class="col-6">
                <button class="menu-btn" onclick="showForm()">
                    <div class="icon-circle bg-success"><i class="fas fa-plus"></i></div>
                    <div class="fw-bold">เพิ่มข้อมูล</div>
                </button>
            </div>
            <div class="col-6">
                <button class="menu-btn" onclick="showHistory()">
                    <div class="icon-circle bg-primary"><i class="fas fa-search"></i></div>
                    <div class="fw-bold">ดูประวัติ</div>
                </button>
            </div>
        </div>
    </div>

    <div id="formSection" class="form-container">
        <div class="d-flex justify-content-between align-items-center">
            <h4 class="mb-0">บันทึกข้อมูลใหม่</h4>
            <button class="btn-close" onclick="goBack()"></button>
        </div>

        <form id="birdForm">
            <div class="section-title">1. ข้อมูลลูกนก</div>
            <div class="row g-2">
                <div class="col-6">
                    <label class="small text-muted">ID ลูกนก</label>
                    <input type="text" class="form-control" placeholder="เช่น ZAM 210">
                </div>
                <div class="col-6">
                    <label class="small text-muted">วันเกิด</label>
                    <input type="date" class="form-control">
                </div>
                <div class="col-4">
                    <label class="small text-muted">สีตัว</label>
                    <input type="text" class="form-control" placeholder="BODY">
                </div>
                <div class="col-4">
                    <label class="small text-muted">สีหัว</label>
                    <input type="text" class="form-control" placeholder="HEAD">
                </div>
                <div class="col-4">
                    <label class="small text-muted">สีอก</label>
                    <input type="text" class="form-control" placeholder="CHEST">
                </div>
            </div>

            <div class="section-title">2. ข้อมูลพ่อพันธุ์ (Male)</div>
            <div class="row g-2">
                <div class="col-12 mb-2">
                    <input type="text" class="form-control" placeholder="ID พ่อพันธุ์">
                </div>
                <div class="col-6">
                    <input type="text" class="form-control" placeholder="ฟาร์ม/ประเทศ">
                </div>
                <div class="col-6 text-center pt-2 small text-muted">ข้อมูลสีดึงอัตโนมัติ*</div>
            </div>

            <div class="section-title">3. ข้อมูลแม่พันธุ์ (Female)</div>
            <div class="row g-2">
                <div class="col-12 mb-2">
                    <input type="text" class="form-control" placeholder="ID แม่พันธุ์">
                </div>
                <div class="col-6">
                    <input type="text" class="form-control" placeholder="ฟาร์ม/ประเทศ">
                </div>
                <div class="col-6 text-center pt-2 small text-muted">ข้อมูลสีดึงอัตโนมัติ*</div>
            </div>

            <button type="button" class="btn-save" onclick="saveData()">
                <i class="fas fa-save me-2"></i>บันทึกข้อมูล
            </button>
        </form>
    </div>

    <div id="historySection">
        <button class="btn btn-sm btn-secondary mb-3" onclick="goBack()">กลับหน้าหลัก</button>
        <div class="bird-card d-flex justify-content-between align-items-center">
            <div>
                <div class="fw-bold">ZAM 201</div>
                <small>BORN: 20 Sep 25</small>
            </div>
            <i class="fas fa-chevron-right text-muted"></i>
        </div>
    </div>
</div>

<script>
    function showForm() {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('formSection').style.display = 'block';
    }
    function showHistory() {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('historySection').style.display = 'block';
    }
    function goBack() {
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('historySection').style.display = 'none';
        document.getElementById('mainMenu').style.display = 'block';
    }
    function saveData() {
        alert('ระบบจะทำการส่งข้อมูลไปยัง Google Sheets...');
        // ในขั้นต่อไปเราจะเชื่อมต่อกับ Google Apps Script เพื่อบันทึกจริง
    }
</script>

</body>
</html>
