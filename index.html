<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Kanit', sans-serif; }
        .hero-section { background: linear-gradient(135deg, #1b5e20, #4caf50); color: white; padding: 40px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; text-align: center; margin-bottom: 30px; }
        .menu-card { border: none; border-radius: 20px; padding: 25px; text-align: center; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-decoration: none; display: block; height: 100%; }
        .menu-card:hover { transform: translateY(-10px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); background-color: #fff; }
        .icon-box { width: 70px; height: 70px; line-height: 70px; border-radius: 50%; margin: 0 auto 15px; font-size: 30px; color: white; }
        .bg-add { background-color: #ff9800; }
        .bg-view { background-color: #2196f3; }
        .menu-title { font-size: 1.2rem; font-weight: bold; color: #333; margin-bottom: 10px; }
        .menu-desc { font-size: 0.9rem; color: #777; }
        
        /* สไตล์สำหรับการแสดงผลประวัติ (ซ่อนไว้ก่อนกดดู) */
        #historySection { display: none; margin-top: 20px; }
        .bird-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #4caf50; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="hero-section">
    <i class="fas fa-dove fa-3x mb-3"></i>
    <h2>ระบบจัดการข้อมูลนก</h2>
    <p>จัดการประวัติและติดตามการเจริญเติบโตได้ง่ายๆ</p>
</div>

<div class="container">
    <div class="row g-4">
        <div class="col-6">
            <a href="https://docs.google.com/spreadsheets/d/1M1H4lTkvkACb7hHpQJcUQQvLXYzNblj6ifJ0CElQ458/edit?gid=0#gid=0" target="_blank" class="menu-card">
                <div class="icon-box bg-add">
                    <i class="fas fa-plus"></i>
                </div>
                <div class="menu-title">เพิ่มข้อมูล</div>
                <div class="menu-desc">บันทึกนกใหม่ลง Google Sheets</div>
            </a>
        </div>

        <div class="col-6">
            <a href="javascript:void(0);" onclick="showHistory()" class="menu-card">
                <div class="icon-box bg-view">
                    <i class="fas fa-search"></i>
                </div>
                <div class="menu-title">ประวัตินก</div>
                <div class="menu-desc">ดูรายการนกทั้งหมด</div>
            </a>
        </div>
    </div>

    <div id="historySection">
        <hr>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4><i class="fas fa-list me-2"></i>รายการลูกนก</h4>
            <button class="btn btn-sm btn-outline-secondary" onclick="hideHistory()">ปิด</button>
        </div>
        
        <div class="bird-item d-flex justify-content-between align-items-center">
            <div>
                <div class="fw-bold text-success">ID: ZAM 201</div>
                <small class="text-muted">เกิด: 20 Sep 25</small>
            </div>
            <button class="btn btn-sm btn-primary">ดูรายละเอียด</button>
        </div>

        <div class="bird-item d-flex justify-content-between align-items-center">
            <div>
                <div class="fw-bold text-success">ID: ZAM 202</div>
                <small class="text-muted">เกิด: 20 Sep 25</small>
            </div>
            <button class="btn btn-sm btn-primary">ดูรายละเอียด</button>
        </div>
    </div>
</div>

<script>
    function showHistory() {
        document.getElementById('historySection').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }
    function hideHistory() {
        document.getElementById('historySection').style.display = 'none';
    }
</script>

</body>
</html>
