<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกประวัตินก</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f0f0; padding: 15px; margin: 0; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 6px solid #4CAF50; }
        .id { font-weight: bold; color: #2e7d32; font-size: 1.2em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; font-size: 0.9em; }
        .parent { margin-top: 10px; padding: 8px; border-radius: 5px; font-size: 0.8em; }
        .male { background: #e3f2fd; }
        .female { background: #fce4ec; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">🐣 รายการประวัตินก</h2>

    <div class="card">
        <div class="id">ID: ZAM 201</div>
        <div>เกิดวันที่: 20 Sep 25</div>
        <div class="grid">
            <div><b>สีตัว:</b> Green</div>
            <div><b>สีหัว:</b> Yellow</div>
            <div><b>หน้าอก:</b> Purple</div>
            <div><b>อายุ:</b> 0Y 7M 1D</div>
        </div>
        <div class="parent male">พ่อ: ZAM 051 (Green/Blue)</div>
        <div class="parent female">แม่: KT 405 (Green/Yellow)</div>
    </div>
    </body>
</html>
